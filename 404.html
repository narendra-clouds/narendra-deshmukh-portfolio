<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Narendra Deshmukh</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #040b14;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background particles */
    .bg-animation {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .bg-animation span {
      position: absolute;
      display: block;
      width: 20px; height: 20px;
      background: rgba(20, 157, 221, 0.15);
      animation: animate 25s linear infinite;
      bottom: -150px;
      border-radius: 4px;
    }

    .bg-animation span:nth-child(1)  { left: 25%;  width: 80px;  height: 80px;  animation-delay: 0s; }
    .bg-animation span:nth-child(2)  { left: 10%;  width: 20px;  height: 20px;  animation-delay: 2s;  animation-duration: 12s; }
    .bg-animation span:nth-child(3)  { left: 70%;  width: 20px;  height: 20px;  animation-delay: 4s; }
    .bg-animation span:nth-child(4)  { left: 40%;  width: 60px;  height: 60px;  animation-delay: 0s;  animation-duration: 18s; }
    .bg-animation span:nth-child(5)  { left: 65%;  width: 20px;  height: 20px;  animation-delay: 0s; }
    .bg-animation span:nth-child(6)  { left: 75%;  width: 110px; height: 110px; animation-delay: 3s; }
    .bg-animation span:nth-child(7)  { left: 35%;  width: 150px; height: 150px; animation-delay: 7s; }
    .bg-animation span:nth-child(8)  { left: 50%;  width: 25px;  height: 25px;  animation-delay: 15s; animation-duration: 45s; }
    .bg-animation span:nth-child(9)  { left: 20%;  width: 15px;  height: 15px;  animation-delay: 2s;  animation-duration: 35s; }
    .bg-animation span:nth-child(10) { left: 85%;  width: 150px; height: 150px; animation-delay: 0s;  animation-duration: 11s; }

    @keyframes animate {
      0%   { transform: translateY(0) rotate(0deg);   opacity: 1;  border-radius: 4px; }
      100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 20px;
      max-width: 650px;
    }

    .error-code {
      font-size: 140px;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #149ddd, #1ed4f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0;
      text-shadow: none;
      letter-spacing: -4px;
    }

    .cloud-icon {
      font-size: 60px;
      color: #149ddd;
      margin: 10px 0;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }

    h2 {
      font-size: 24px;
      font-weight: 600;
      color: #fff;
      margin: 16px 0 8px;
    }

    p {
      font-size: 15px;
      color: #a8b2d8;
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #149ddd, #1ed4f0);
      color: #fff;
      padding: 14px 36px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(20, 157, 221, 0.35);
    }

    .btn-home:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(20, 157, 221, 0.5);
      color: #fff;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(135deg, #149ddd, #1ed4f0);
      margin: 20px auto;
      border-radius: 2px;
    }

    .aws-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(20, 157, 221, 0.1);
      border: 1px solid rgba(20, 157, 221, 0.3);
      color: #149ddd;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      margin-top: 32px;
    }

    .social-links {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .social-links a {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a8b2d8;
      font-size: 16px;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .social-links a:hover {
      background: #149ddd;
      border-color: #149ddd;
      color: #fff;
      transform: translateY(-3px);
    }

    .name-tag {
      font-size: 13px;
      color: #a8b2d8;
      margin-top: 24px;
    }

    .name-tag strong {
      color: #149ddd;
    }
  </style>
</head>
<body>

  <div class="bg-animation">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="container">

    <div class="error-code">404</div>

    <div class="cloud-icon">
      <i class="bi bi-cloud-slash"></i>
    </div>

    <div class="divider"></div>

    <h2>Page Not Found</h2>
    <p>
      Looks like this page got lost somewhere between<br>
      the S3 bucket and the CloudFront edge location. 😄<br>
      Let's get you back to the right place.
    </p>

    <a href="index.html" class="btn-home">
      <i class="bi bi-house-door-fill"></i>
      Back to Home
    </a>

    <div class="social-links">
      <a href="https://github.com/narendra-clouds" target="_blank" title="GitHub">
        <i class="bi bi-github"></i>
      </a>
      <a href="https://www.linkedin.com/in/narendra-deshmukh-cloud/" target="_blank" title="LinkedIn">
        <i class="bi bi-linkedin"></i>
      </a>
      <a href="mailto:deshmukhn298@gmail.com" title="Email">
        <i class="bi bi-envelope-fill"></i>
      </a>
    </div>

    <div class="aws-badge">
      <i class="bi bi-cloud-check"></i>
      Hosted on AWS S3 + CloudFront | Mumbai Region
    </div>

    <p class="name-tag">
      <strong>Narendra Deshmukh</strong> — AWS Cloud & DevOps Engineer
    </p>

  </div>

</body>
</html>
